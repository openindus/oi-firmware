image: python:latest

stages:
  - build

before_script:
  - "pip install -U platformio"
  - "pio platform update"

jobs:
  stage: build
  script: 
    - "pio run -e core"
    - "pio run -e discrete"
    - "pio run -e discreteve"
    - "pio run -e stepper"
    - "pio run -e mixed"
    - "pio run -e relayhp"
    - "pio run -e relaylp"

variables:
  GIT_SUBMODULE_STRATEGY: recursive
