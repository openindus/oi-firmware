image: python:latest

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - .oi/
    - .pio/
    - docs/build/

build:firmware:
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - pip install -U platformio
    - pio platform update
  script:
    - pio run -t clean
    - pio run -e core
    - pio run -e discrete
    - pio run -e discreteve
    - pio run -e stepper
    - pio run -e stepperve
    - pio run -e mixed
    - pio run -e relayhp
    - pio run -e relaylp
  only:
    - tags
    - master
    - dev

build:examples:
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script: echo "build examples"
  only:
    - tags
    - master
    - dev

build:docs:
  stage: build
  before_script:
    - pip install virtualenv
    - export PATH="$HOME/.local/bin:$PATH"
    - virtualenv venv
    - source venv/bin/activate
    - pip install -r docs/requirements.txt
  script:
    - cd docs
    - make clean
    - doxygen doxygen/Doxyfile
    - make html
  only:
    - tags
    - master
    - dev

test:firmware:
  stage: test
  needs:
    - job: build:firmware
  script: 
    - echo "pio run -t upload"
    - echo "pio test"
  only:
    - tags
    - master

deploy:
  stage: deploy
  needs:
  - job: build:firmware
  - job: build:examples
  - job: build:docs
  script: 
    - echo "deploy"
  only:
    - tags

deploy:bin:
  stage: deploy
  needs:
    - job: deploy
  script: 
    - lftp ftp.openindus.com -e "mirror --reverse --verbose -R ./.oi/bin/ ./oi-content/bin/; quit" -u $FTP_USERNAME,$FTP_PASSWORD
    - lftp $OVH_URI -e "mirror --reverse --verbose -R ./.oi/bin/ ./www/oi-content/bin/; quit" -u $OVH_USERNAME,$OVH_PASSWORD
  only:
    - tags

deploy:docs:
  stage: deploy
  needs:
    - job: deploy
  script:
    - lftp ftp.openindus.com -e "mirror --reverse --verbose --delete -R ./docs/build/html/ ./oi-content/doc/; quit" -u $FTP_USERNAME,$FTP_PASSWORD
    - lftp $OVH_URI -e "mirror --reverse --verbose --delete -R ./docs/build/html/ ./www/oi-content/doc/; quit" -u $OVH_USERNAME,$OVH_PASSWORD
  only:
    - tags
