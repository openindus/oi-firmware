; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = main
test_dir = tests
default_envs = core

[env]
platform = espressif32 @ 3.5.0
framework = espidf

monitor_speed = 115200
monitor_flags = --raw
monitor_rts = 0
monitor_dtr = 0
; upload_port =

extra_scripts = 
    tools/extra_scripts.py
    post:tools/copy_binaries.py

[env:core]
board = oi-core

[env:discrete]
board = oi-discrete

[env:discreteve]
board = oi-discreteve

[env:stepper]
board = oi-stepper

[env:stepperve]
board = oi-stepperve

[env:mixed]
board = oi-mixed

[env:relayhp]
board = oi-relayhp

[env:relaylp]
board = oi-relaylp